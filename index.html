<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fuel Mining Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --hint-color: #aaaaaa;
            --accent-main: #ffca28;
            --accent-fuel: #ef5350;
            --accent-green: #66bb6a;
        }

        body {
            margin: 0;
            font-family: Arial;
            color: white;

            background: url('assets/bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .balance {
            text-align: center;
            margin: 20px;
        }

        .balance h1 {
            font-size: 40px;
            color: var(--accent-main);
        }

        .card {
            background: rgba(255,255,255,0.05);
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        .sell {
            background: var(--accent-main);
            color: black;
        }

        .upgrade {
            background: none;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }

        #settings {
            display:none;
            position:fixed;
            bottom:0;
            width:100%;
            background:#222;
            padding:20px;
        }
    </style>
</head>

<body>

<header>
    <div id="userName">User</div>
    <button onclick="openSettings()">⚙️</button>
</header>

<div class="balance">
    <div>Balance</div>
    <h1>$<span id="balance">0</span></h1>
</div>

<div class="card">
    Fuel: <span id="fuel">0</span>
</div>

<button class="sell" onclick="sellFuel()" id="sellBtn">Sell</button>
<button class="upgrade" onclick="upgrade()" id="upgradeBtn">Upgrade</button>

<div id="settings">
    <h3>Settings</h3>
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ru')">Русский</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

if (tg.initDataUnsafe.user) {
    document.getElementById("userName").innerText =
        tg.initDataUnsafe.user.first_name;
}

// --- ЯЗЫК ---
const t = {
    en: { sell: "Sell Fuel", upgrade: "Upgrade" },
    ru: { sell: "Продать", upgrade: "Улучшить" }
};

function applyLang() {
    let lang = localStorage.getItem("lang") || "en";
    document.getElementById("sellBtn").innerText = t[lang].sell;
    document.getElementById("upgradeBtn").innerText = t[lang].upgrade;
}

function setLang(lang) {
    localStorage.setItem("lang", lang);
    applyLang();
}

applyLang();

// --- КНОПКИ ---
function sellFuel() {
    tg.sendData("sell");
}

function upgrade() {
    tg.sendData("upgrade");
}

function openSettings() {
    document.getElementById("settings").style.display = "block";
}
</script>

</body>
</html>
