<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Базовые стили и анимированный фон */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(-45deg, #0d0e15, #1a2a6c, #112, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow-x: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            padding: 15px;
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ СТАТИСТИКИ --- */
        .top-stats-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
        }

        .stat-value {
            font-weight: 800;
            font-size: 18px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- ЦЕНТРАЛЬНАЯ АНИМАЦИЯ (GIF) --- */
        .animation-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            min-height: 200px; /* Минимальная высота для области картинки */
        }

        .main-gif {
            max-width: 80%;
            max-height: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 136, 0.2);
            /* Эффект "дыхания" или пульсации для самой картинки */
            animation: pulseImg 4s infinite ease-in-out alternate;
        }

        @keyframes pulseImg {
            0% { transform: scale(0.98); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 136, 0.1); }
            100% { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 35px rgba(0, 255, 136, 0.4); }
        }

        /* --- БАЛАНС ДЕНЕГ (теперь под анимацией) --- */
        .money-display {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .money-val {
            font-size: 42px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- КНОПКИ УПРАВЛЕНИЯ --- */
        .controls {
            margin-top: auto; /* Прижимаем вниз */
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
            margin-bottom: 10px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        /* --- ИНФОРМАЦИЯ ОБ АПГРЕЙДЕ (Всплывающее окно / панель) --- */
        .upgrade-info-panel {
            display: none; /* Скрыто по умолчанию */
            background: rgba(10, 15, 30, 0.95);
            border: 1px solid #00ff88;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upgrade-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ff88;
            text-align: center;
        }

        .upgrade-cost {
            font-size: 24px;
            text-align: center;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .buff-list {
            font-size: 14px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
        }

        .buff-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        /* --- ЭКРАНЫ --- */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* --- СТИЛИ ДЛЯ ЭКРАНА РЕФЕРАЛОВ --- */
        .ref-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .ref-stat-big {
            font-size: 36px;
            font-weight: bold;
            color: #00ff88;
            margin: 10px 0;
        }

        .header-nav {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 16px;
            padding: 0;
            width: auto;
            margin: 0;
            text-transform: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .screen-title {
            flex-grow: 1;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 30px; /* Чтобы компенсировать кнопку назад */
        }

    </style>
</head>

<body>

<div class="container">

    <div id="screen-main" class="screen active">
        
        <div class="top-stats-panel">
            <div class="stat-item">
                <span class="stat-label">Топливо ⛽</span>
                <span class="stat-value" id="fuel">0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Нефть 🛢</span>
                <span class="stat-value" id="oil">0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Уровень ⬆</span>
                <span class="stat-value" id="level" style="color: white;">1</span>
            </div>
        </div>

        <div class="animation-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z6cWJwYTNqa2Zwa2hsaGg2cXFwZ3p1cGJyZG9xaXBnZnNweWM1eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/LpwBqCorPvZC0/giphy.gif" alt="Oil Rig" class="main-gif">
        </div>

        <div class="money-display">
            <div class="stat-label">Твой Баланс</div>
            <div class="money-val">$<span id="money">0.00</span></div>
        </div>

        <div id="upgrade-panel" class="upgrade-info-panel">
            <div class="upgrade-title">Апгрейд Станции до ур. <span id="next-level">2</span></div>
            <div class="upgrade-cost">-$<span id="upgrade-cost-val">250</span></div>
            
            <div class="buff-list">
                <div class="buff-item">
                    <span>Скорость добычи:</span>
                    <span style="color:#00ff88" id="buff-speed">1 ➔ 2 🛢/час</span>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="confirmUpgrade()" style="margin:0;">Купить</button>
                <button class="btn-secondary" onclick="hideUpgradePanel()" style="margin:0; background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.4);">Отмена</button>
            </div>
        </div>

        <div class="controls" id="main-controls">
            <button class="btn-primary" onclick="sell()">Продать топливо</button>
            <button class="btn-secondary" onclick="showUpgradePanel()">Улучшить станцию</button>
            
            <div class="btn-group">
                <button class="btn-secondary" onclick="switchScreen('screen-ref')">Рефералы 👥</button>
                <button class="btn-secondary" onclick="loadLB()">Топ 10 🏆</button>
            </div>
        </div>
    </div>


    <div id="screen-ref" class="screen">
        <div class="header-nav">
            <button class="back-btn" onclick="switchScreen('screen-main')">
                ◀ Назад
            </button>
            <div class="screen-title">Партнерская сеть</div>
        </div>

        <div class="ref-card">
            <div class="stat-label">Твой бонус к добыче</div>
            <div class="ref-stat-big">+<span id="ref-bonus-val">0</span>%</div>
            <p style="font-size: 13px; opacity: 0.7; margin-bottom: 0;">
                Каждый приглашенный друг дает +1% к выработке топлива (макс 20%).
            </p>
        </div>

        <div style="flex-grow: 1;">
            <div style="text-align: center; opacity: 0.5; margin-top: 40px; font-size: 14px;">
                <p>Приглашай друзей и получай пассивный буст к добыче!</p>
                <p>Твой ID: <span id="display-user-id">...</span></p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="copyRef()">Скопировать ссылку</button>
        </div>
    </div>

</div>

<script>
// --- ИНИЦИАЛИЗАЦИЯ TELEGRAM ---
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const user = tg.initDataUnsafe?.user;
const user_id = user?.id || 123456789; 
const first_name = user?.first_name || "Player";

document.getElementById("display-user-id").innerText = user_id;

const API = "https://bot-kxfw.onrender.com";

// Глобальные переменные для хранения состояния клиента
let currentLevel = 1;
let currentMoney = 0;

// --- ЛОГИКА РЕФЕРАЛОВ ПРИ СТАРТЕ ---
const start_param = tg.initDataUnsafe?.start_param;
if (start_param && start_param != user_id) {
    fetch(`${API}/ref?user_id=${user_id}&ref_id=${start_param}`).catch(e => console.log(e));
}

// Вибрация
function vibe(type = 'light') {
    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
}

// --- НАВИГАЦИЯ ---
function switchScreen(screenId) {
    vibe('light');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// --- СИНХРОНИЗАЦИЯ С СЕРВЕРОМ ---
async function sync(){
    try {
        let r = await fetch(`${API}/sync?user_id=${user_id}&name=${encodeURIComponent(first_name)}`);
        let d = await r.json();

        currentLevel = d.level;
        currentMoney = d.money;

        document.getElementById("money").innerText = d.money.toFixed(2);
        document.getElementById("fuel").innerText = d.fuel.toFixed(2);
        document.getElementById("oil").innerText = d.oil.toFixed(2);
        document.getElementById("level").innerText = d.level;
        
        // Отображение реф-бонуса в процентах (0.01 = 1%)
        let bonusPercent = Math.round((d.ref_bonus || 0) * 100);
        document.getElementById("ref-bonus-val").innerText = bonusPercent;

    } catch (e) {
        console.error("Sync error", e);
    }
}

// --- ИГРОВЫЕ ДЕЙСТВИЯ ---

async function sell(){
    vibe('medium');
    let btn = document.querySelector('.sell');
    if(btn) btn.innerText = "Продажа...";
    
    await fetch(`${API}/sell?user_id=${user_id}`, {method:"POST"});
    await sync();
    
    if(btn) btn.innerText = "Продать топливо";
    vibe('rigid');
}

// --- ЛОГИКА АПГРЕЙДА ---

function showUpgradePanel() {
    vibe('light');
    const cost = currentLevel * 250;
    
    document.getElementById('next-level').innerText = currentLevel + 1;
    document.getElementById('upgrade-cost-val').innerText = cost;
    
    // Показываем изменение добычи (Базовая скорость 1 * уровень)
    const currentSpeed = currentLevel * 1;
    const nextSpeed = (currentLevel + 1) * 1;
    document.getElementById('buff-speed').innerText = `${currentSpeed} ➔ ${nextSpeed} 🛢/час`;

    // Скрываем основные кнопки, показываем панель
    document.getElementById('main-controls').style.display = 'none';
    document.getElementById('upgrade-panel').style.display = 'block';

    // Подсветка красным, если не хватает денег
    if (currentMoney < cost) {
        document.getElementById('upgrade-cost-val').style.color = '#ff4444';
    } else {
        document.getElementById('upgrade-cost-val').style.color = 'white';
    }
}

function hideUpgradePanel() {
    vibe('light');
    document.getElementById('upgrade-panel').style.display = 'none';
    document.getElementById('main-controls').style.display = 'block';
}

async function confirmUpgrade(){
    const cost = currentLevel * 250;
    if (currentMoney < cost) {
        tg.showAlert("Недостаточно средств для улучшения!");
        vibe('heavy');
        return;
    }

    vibe('heavy');
    // Меняем текст кнопки для эффекта загрузки
    const btn = document.querySelector('#upgrade-panel .btn-primary');
    const originalText = btn.innerText;
    btn.innerText = "Улучшение...";

    await fetch(`${API}/upgrade?user_id=${user_id}`, {method:"POST"});
    await sync();
    
    btn.innerText = originalText;
    hideUpgradePanel();
    tg.showAlert(`Станция улучшена до ${currentLevel} уровня!`);
}

// --- ОСТАЛЬНЫЕ ФУНКЦИИ ---

function copyRef(){
    vibe('medium');
    // ВАЖНО: замени YOUR_BOT_USERNAME на реальный юзернейм
    const link = `https://t.me/YOUR_BOT_USERNAME?start=${user_id}`;
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(link).then(() => {
            tg.showAlert("Ссылка скопирована! Отправь её друзьям.");
        });
    } else {
        let textArea = document.createElement("textarea");
        textArea.value = link;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("Copy");
        textArea.remove();
        tg.showAlert("Ссылка скопирована!");
    }
}

async function loadLB(){
    vibe('light');
    tg.showAlert("Загрузка таблицы лидеров...");
    try {
        let r = await fetch(API+"/leaderboard");
        let data = await r.json();

        let message = "🏆 ТОП 10 ОЛИГАРХОВ 🏆\n\n";
        data.forEach((u, i) => {
            let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
            message += `${medal} ${u.name || 'Игрок'}: $${Number(u.money).toFixed(0)}\n`;
        });
        
        tg.showAlert(message);
    } catch(e) {
        tg.showAlert("Ошибка загрузки рейтинга");
    }
}

// Запускаем синхронизацию
setInterval(sync, 4000);
sync();

</script>

</body>
</html>
