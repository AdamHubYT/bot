<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: system-ui;
    color:white;
    background:url('assets/bg.jpg') center/cover no-repeat;
}

.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.container {
    position:relative;
    padding:20px;
}

.balance {
    font-size:42px;
    font-weight:800;
    color:#ffca28;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:16px;
    margin-top:10px;
}

.btn {
    margin-top:10px;
    padding:15px;
    border-radius:14px;
    border:none;
    font-size:16px;
}

.primary {background:#ffca28;color:black;}
.secondary {border:2px solid #66bb6a;color:#66bb6a;background:none;}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="container">
    <h2 id="name">Player</h2>

    <div class="balance">$<span id="money">0</span></div>

    <div class="card">
        Fuel: <span id="fuel">0</span><br>
        Level: <span id="level">1</span>
    </div>

    <button class="btn primary" onclick="sell()">Sell</button>
    <button class="btn secondary" onclick="upgrade()">Upgrade</button>
</div>

<script>
const API = "https://ТВОЙ-СЕРВЕР"; // <-- ВСТАВЬ СЮДА

let tg = window.Telegram.WebApp;
tg.expand();

let user_id = tg.initDataUnsafe.user?.id || 1;

document.getElementById("name").innerText =
    tg.initDataUnsafe.user?.first_name || "Player";

async function sync() {
    let res = await fetch(API + "/sync?user_id=" + user_id);
    let data = await res.json();

    document.getElementById("money").innerText = data.money.toFixed(2);
    document.getElementById("fuel").innerText = data.fuel.toFixed(2);
    document.getElementById("level").innerText = data.level;
}

async function sell() {
    await fetch(API + "/sell?user_id=" + user_id, {method:"POST"});
    sync();
}

async function upgrade() {
    await fetch(API + "/upgrade?user_id=" + user_id, {method:"POST"});
    sync();
}

setInterval(sync, 2000);
sync();
</script>

</body>
</html>
