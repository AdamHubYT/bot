<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
margin:0;
font-family:system-ui;
background: radial-gradient(circle at top, #1a1a1a, #000);
color:white;
overflow:hidden;
}

.container {
padding:20px;
}

.card {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
padding:15px;
border-radius:16px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.1);
}

.title {
font-size:22px;
font-weight:800;
}

.stat {
font-size:18px;
margin:5px 0;
}

.money {
font-size:42px;
color:#00ff88;
font-weight:900;
}

button {
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:16px;
cursor:pointer;
}

.sell {
background:#00ff88;
color:black;
font-weight:700;
}

.up {
background:#111;
color:#fff;
border:1px solid #00ff88;
}
</style>
</head>

<body>

<div class="container">

<div class="title" id="name">Player</div>

<div class="card">
<div class="money">$<span id="money">0</span></div>
</div>

<div class="card">
<div class="stat">⛽ Fuel: <span id="fuel">0</span></div>
<div class="stat">🛢 Oil: <span id="oil">0</span></div>
<div class="stat">⬆ Level: <span id="level">1</span></div>
</div>

<button class="sell" onclick="sell()">SELL FUEL</button>
<button class="up" onclick="upgrade()">UPGRADE</button>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const user_id = user?.id;

document.getElementById("name").innerText = user?.first_name || "Player";

const API = "https://bot-kxfw.onrender.com";

async function sync(){
let r = await fetch(API+"/sync?user_id="+user_id);
let d = await r.json();

document.getElementById("money").innerText = d.money.toFixed(2);
document.getElementById("fuel").innerText = d.fuel.toFixed(2);
document.getElementById("oil").innerText = d.oil.toFixed(2);
document.getElementById("level").innerText = d.level;
}

async function sell(){
await fetch(API+"/sell?user_id="+user_id,{method:"POST"});
sync();
}

async function upgrade(){
await fetch(API+"/upgrade?user_id="+user_id,{method:"POST"});
sync();
}

setInterval(sync, 3000);
sync();
</script>

</body>
</html>
