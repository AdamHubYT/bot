<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body {
margin:0;
font-family:system-ui;
background: radial-gradient(circle at top, #111, #000);
color:white;
overflow:hidden;
}

.container {
padding:20px;
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from {opacity:0; transform:translateY(10px);}
to {opacity:1; transform:translateY(0);}
}

.card {
background: rgba(255,255,255,0.06);
backdrop-filter: blur(14px);
padding:18px;
border-radius:20px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,0.1);
}

.money {
font-size:42px;
font-weight:900;
color:#00ff88;
}

.stat {
opacity:0.8;
margin:6px 0;
}

button {
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:none;
font-size:15px;
font-weight:700;
transition:0.2s;
}

button:active {transform:scale(0.97);}

.sell {background:#00ff88;color:black;}
.up {background:#1a1a1a;color:white;border:1px solid #00ff88;}
.ref {background:#111;color:white;border:1px solid #333;}

.progress {
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.bar {
height:100%;
width:40%;
background:#00ff88;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<div id="name">Player</div>
<div class="money">$<span id="money">0</span></div>
</div>

<div class="card">
<div class="stat">⛽ Fuel: <span id="fuel"></span></div>
<div class="stat">🛢 Oil: <span id="oil"></span></div>
<div class="stat">⬆ Level: <span id="level"></span></div>

<div class="progress"><div class="bar"></div></div>
</div>

<button class="sell" onclick="sell()">SELL FUEL</button>
<button class="up" onclick="upgrade()">UPGRADE</button>
<button class="ref" onclick="copyRef()">REF LINK</button>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const user_id = user?.id;

document.getElementById("name").innerText = user?.first_name || "Player";

const API = "https://bot-kxfw.onrender.com";

async function sync(){
let r = await fetch(API+"/sync?user_id="+user_id);
let d = await r.json();

document.getElementById("money").innerText = d.money.toFixed(2);
document.getElementById("fuel").innerText = d.fuel.toFixed(2);
document.getElementById("oil").innerText = d.oil.toFixed(2);
document.getElementById("level").innerText = d.level;
}

async function sell(){
await fetch(API+"/sell?user_id="+user_id,{method:"POST"});
sync();
}

async function upgrade(){
await fetch(API+"/upgrade?user_id="+user_id,{method:"POST"});
sync();
}

function copyRef(){
const link = `https://t.me/YOUR_BOT?start=${user_id}`;
navigator.clipboard.writeText(link);
tg.showAlert("Copied!");
}

setInterval(sync, 4000);
sync();

</script>

</body>
</html>
