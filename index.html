<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fuel Mining Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* --- КОНСТРУКТОР: ГЛАВНЫЕ НАСТРОЙКИ (ЦВЕТА И ШРИФТЫ) --- */
        :root {
            /* Переменные цветов Telegram (автоматически подстраиваются под тему) */
            --bg-color: var(--tg-theme-bg-color, #1a1a1a);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            
            /* Кастомные акцентные цвета (меняй их тут, чтобы изменить всю игру) */
            --accent-main: #ffca28; /* Золотой/Желтый для денег и важных кнопок */
            --accent-fuel: #ef5350; /* Красный для топлива */
            --accent-green: #66bb6a; /* Зеленый для успехов/апгрейдов */
            
            /* Компоненты UI */
            --card-bg: rgba(255, 255, 255, 0.05); /* Фон для карточек */
            --card-radius: 16px; /* Закругление углов */
            --shadow: 0 4px 15px rgba(0,0,0,0.2); /* Тень для объема */
            
            --font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        body { 
            font-family: var(--font-family); 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            user-select: no; /* Запрет выделения текста */
        }

        /* --- ШАПКА (HEADER) --- */
        header {
            padding: 20px 16px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #userName { margin: 0; font-size: 20px; font-weight: 700; }
        .company-subtitle { font-size: 14px; color: var(--hint-color); margin-top: 4px; }
        .header-icons { display: flex; gap: 12px; }
        .icon-btn { color: var(--hint-color); background: none; border: none; font-size: 24px; cursor: pointer; padding: 0; }

        /* --- ГЛАВНЫЙ КОНТЕНТ --- */
        main { flex: 1; padding: 0 16px; overflow-y: auto; }

        /* --- КАРТОЧКА БАЛАНСА (ЦЕНТРАЛЬНЫЙ ЭЛЕМЕНТ) --- */
        .balance-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .balance-label { font-size: 14px; color: var(--accent-main); text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 40px; font-weight: 800; margin: 10px 0; color: #fff; text-shadow: 0 2px 10px rgba(255,202,40,0.3); }
        .balance-value-suffix { font-size: 18px; color: var(--hint-color); font-weight: 400; }

        /* --- СТАТИСТИКА (РОВНЫЕ СТРОКИ) --- */
        .stats-block { margin-bottom: 25px; }
        .stat-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 16px; 
            background: var(--card-bg); 
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .stat-info { display: flex; align-items: center; gap: 10px; }
        .stat-icon { font-size: 24px; color: var(--accent-main); }
        .stat-icon.fuel { color: var(--accent-fuel); }
        .stat-label { font-size: 16px; color: #fff; }
        .stat-hint { font-size: 12px; color: var(--hint-color); margin-top: 2px; }
        .stat-value { font-size: 18px; font-weight: 600; color: #fff; }

        /* --- КНОПКИ (BUTTONS) --- */
        .action-block { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }

        /* Кнопка ПРОДАТЬ (главная, яркая) */
        .btn-primary {
            background: var(--accent-main);
            color: #000;
            border: none;
            padding: 18px 25px;
            border-radius: var(--card-radius);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(255,202,40,0.3);
        }

        /* Кнопка УЛУЧШИТЬ (второстепенная, зеленая) */
        .btn-upgrade {
            background: none;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            padding: 18px 25px;
            border-radius: var(--card-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Эффект нажатия (как в нативном приложении) */
        .btn-primary:active, .btn-upgrade:active { transform: scale(0.97); }
        .btn-upgrade:hover { background: rgba(102, 187, 106, 0.1); }

        /* Скрыть элементы до загрузки данных */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; color: var(--hint-color); }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        Loading Mining Data...
    </div>

    <header>
        <div>
            <div class="company-subtitle">Gas Station Tycoon</div>
            <h2 id="userName">User Station</h2>
        </div>
        <div class="header-icons">
            <span class="material-icons icon-btn">language</span>
            <span class="material-icons icon-btn">settings</span>
        </div>
    </header>
    
    <main>
        <div class="balance-card">
            <div class="balance-label">Cash Balance</div>
            <div class="balance-value">$<span id="balance">0.00</span></div>
            <div class="balance-hint company-subtitle">Auto-mined 1 min ago</div>
        </div>

        <div class="stats-block">
            <div class="stat-row">
                <div class="stat-info">
                    <span class="material-icons stat-icon fuel">gas_meter</span>
                    <div>
                        <div class="stat-label">Available Fuel</div>
                        <div class="stat-hint">Refines automatically</div>
                    </div>
                </div>
                <div class="stat-value"><span id="fuel">0.00</span> L</div>
            </div>

            <div class="stat-row">
                <div class="stat-info">
                    <span class="material-icons stat-icon">precision_manufacturing</span>
                    <div>
                        <div class="stat-label">Mining Rig</div>
                        <div class="stat-hint">Current Production Level</div>
                    </div>
                </div>
                <div class="stat-value">LVL <span id="rigLevel">1</span></div>
            </div>
        </div>

        <div class="action-block">
            <button class="btn-primary" onclick="sellFuel()">
                <span class="material-icons">paid</span>
                Sell All Fuel
            </button>
            
            <button class="btn-upgrade" onclick="openUpgrades()">
                <span class="material-icons">upgrade</span>
                Open Upgrades
            </button>
        </div>
    </main>

    <script>
        // Инициализация Telegram Mini App API
        let tg = window.Telegram.WebApp;
        
        // Устанавливаем цвета заголовка и фона, чтобы приложение сливалось с ТГ
        tg.setHeaderColor('bg_color');
        tg.setBackgroundColor('bg_color');
        tg.expand(); // Развернуть на весь экран

        // Автоматически берем имя игрока из Telegram
        if (tg.initDataUnsafe.user) {
            document.getElementById('userName').innerText = `${tg.initDataUnsafe.user.first_name}'s Station`;
        } else {
            document.getElementById('userName').innerText = "Guest Station"; // Для тестов в браузере
        }

        // --- ЛОГИКА ИГРЫ (ОДНА ФУНКЦИЯ ДЛЯ СВЯЗИ С БОТОМ) ---

        function sellFuel() {
            // Вибрация при нажатии (только на телефоне)
            tg.HapticFeedback.impactOccurred('medium');
            
            // Отправляем боту команду (хэндлер в main.py на неё отреагирует)
            tg.sendData("sell_fuel_trigger"); 
            
            // Пока бот обрабатывает продажу, мы можем показать, что данные ушли
            document.getElementById('fuel').innerText = "0.00";
            document.getElementById('balance').innerText = "Updating...";
            
            // Закрываем приложение, чтобы игрок получил сообщение от бота
            tg.close();
        }
        
        function openUpgrades() {
            // Для примера просто закрываем, но тут можно открыть другое окно UI
            tg.close(); 
        }

        // Убираем заставку загрузки через 1.5 секунды (имитация загрузки данных)
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
        }, 1500);

    </script>
</body>
</html>
